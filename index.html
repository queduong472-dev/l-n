<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Quản Lý Cửa Hàng - BTLL</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; display: flex; background: #f4f7f6; height: 100vh; }
        .sidebar { width: 250px; background: var(--primary); color: white; display: flex; flex-direction: column; }
        .sidebar h2 { padding: 20px; text-align: center; background: #1a252f; margin: 0; font-size: 1.1em; }
        .nav-item { padding: 15px 25px; cursor: pointer; border-left: 5px solid transparent; }
        .nav-item.active { background: #34495e; border-left: 5px solid var(--accent); }
        .content { flex: 1; padding: 30px; overflow-y: auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        /* Form nhập liệu */
        .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; flex: 1; min-width: 120px; }
        .btn { padding: 10px 18px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; }
        .btn-add { background: var(--success); }
        .btn-del { background: var(--danger); padding: 5px 10px; font-size: 12px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; color: var(--primary); padding: 15px; text-align: left; border-bottom: 2px solid #dee2e6; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>QUẢN LÝ CỬA HÀNG 👔</h2>
    <div class="nav-item active">📦 Sản Phẩm</div>
</div>

<div class="content">
    <div class="card">
        <h1>Quản lý Sản Phẩm</h1>
        
        <div class="toolbar">
            <input type="text" id="in-id" placeholder="Mã (VD: SP03)">
            <input type="text" id="in-name" placeholder="Tên sản phẩm">
            <input type="text" id="in-type" placeholder="Loại (Áo/Quần)">
            <input type="text" id="in-price" placeholder="Giá bán">
            <input type="number" id="in-stock" placeholder="Kho">
            <button class="btn btn-add" onclick="addNewProduct()">➕ Thêm Mới</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Mã</th>
                    <th>Tên SP</th>
                    <th>Loại</th>
                    <th>Giá Bán</th>
                    <th>Kho</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody id="product-list"></tbody>
        </table>
    </div>
</div>

<script>
    // Dữ liệu mẫu từ SQL của bạn [cite: 14, 214]
    let products = [
        { id: "SP01", name: "Áo Sơ Mi Trắng", type: "Áo", price: "250,000", stock: 10 },
        { id: "SP02", name: "Quần Jean Nam Xanh", type: "Quần", price: "550,000", stock: 67 }
    ];

    function renderTable() {
        const body = document.getElementById('product-list');
        body.innerHTML = products.map((item, index) => `
            <tr>
                <td>${item.id}</td>
                <td>${item.name}</td>
                <td>${item.type}</td>
                <td>${item.price}</td>
                <td>${item.stock}</td>
                <td><button class="btn btn-del" onclick="deleteProduct(${index})">Xóa</button></td>
            </tr>
        `).join('');
    }

    function addNewProduct() {
        const id = document.getElementById('in-id').value;
        const name = document.getElementById('in-name').value;
        const type = document.getElementById('in-type').value;
        const price = document.getElementById('in-price').value;
        const stock = document.getElementById('in-stock').value;

        if (id && name && price) {
            products.push({ id, name, type, price, stock });
            renderTable(); // Vẽ lại bảng
            // Xóa sạch ô nhập
            document.querySelectorAll('.toolbar input').forEach(i => i.value = "");
        } else {
            alert("Vui lòng nhập Mã, Tên và Giá!");
        }
    }

    function deleteProduct(index) {
        if (confirm("Xóa sản phẩm này?")) {
            products.splice(index, 1);
            renderTable();
        }
    }

    renderTable(); // Khởi tạo
</script>
</body>
</html>
