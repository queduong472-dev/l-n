<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Quản Lý Cửa Hàng - Full Chức Năng</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; display: flex; background: #f4f7f6; height: 100vh; }
        .sidebar { width: 260px; background: var(--primary); color: white; display: flex; flex-direction: column; }
        .sidebar h2 { padding: 25px; text-align: center; background: #1a252f; margin: 0; font-size: 1.1em; }
        .nav-item { padding: 18px 25px; cursor: pointer; transition: 0.3s; border-left: 5px solid transparent; }
        .nav-item.active { background: #34495e; border-left: 5px solid var(--accent); }
        .content { flex: 1; padding: 30px; overflow-y: auto; }
        
        /* Dashboard Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; border-left: 5px solid var(--accent); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stat-card h3 { margin: 0; font-size: 0.85em; color: #7f8c8d; text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0 0; font-size: 1.6em; font-weight: bold; color: var(--primary); }

        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .toolbar { display: flex; justify-content: space-between; gap: 15px; margin-bottom: 20px; }
        .search-box { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .btn { padding: 10px 18px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; }
        .btn-add { background: var(--success); }
        .btn-edit { background: var(--warning); font-size: 11px; padding: 5px 8px; margin-right: 3px; }
        .btn-del { background: var(--danger); font-size: 11px; padding: 5px 8px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 15px; text-align: left; border-bottom: 2px solid #dee2e6; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>QUẢN LÝ CỬA HÀNG 👔</h2>
    <div class="nav-item active" id="btn-sp" onclick="switchTab('sp')">📦 Sản Phẩm</div>
    <div class="nav-item" id="btn-nv" onclick="switchTab('nv')">👥 Nhân Viên</div>
    <div class="nav-item" id="btn-kh" onclick="switchTab('kh')">⭐ Khách Hàng</div>
    <div class="nav-item" id="btn-hd" onclick="switchTab('hd')">🧾 Hóa Đơn</div>
</div>

<div class="content">
    <div class="stats-grid">
        <div class="stat-card" style="border-left-color: var(--success);"><h3>Doanh Thu</h3><p id="st-rev">0đ</p></div>
        <div class="stat-card"><h3>Số Mặt Hàng</h3><p id="st-count">0</p></div>
        <div class="stat-card" style="border-left-color: var(--danger);"><h3>Hết Hàng</h3><p id="st-out">0</p></div>
    </div>

    <div class="card">
        <h1 id="tab-title" style="margin-top:0; font-size: 1.4em;">Quản lý Sản Phẩm</h1>
        <div class="toolbar">
            <input type="text" id="searchInput" class="search-box" placeholder="Tìm kiếm nhanh..." onkeyup="handleSearch()">
            <button class="btn" style="background:#607d8b" onclick="exportCSV()">📊 Xuất File</button>
        </div>
        <div style="background:#f9f9f9; padding:15px; border-radius:8px; margin-bottom:20px; display:grid; grid-template-columns: repeat(auto-fit,minmax(120px,1fr)); gap:10px;">
            <div id="fields" style="display:contents"></div>
            <button class="btn btn-add" id="sub-btn" onclick="save()">Lưu</button>
        </div>
        <table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('store_v3')) || {
        sp: [{id:"SP01", name:"Áo Sơ Mi", type:"Áo", buy:150, sell:250, stock:0}],
        nv: [{id:"NV01", name:"Văn Anh", role:"Quản lý", phone:"090"}],
        kh: [{id:"KH01", name:"Thị Mai", phone:"032", addr:"Hà Nội"}],
        hd: [{id:"HD01", date:"2023-09-01", total:400, nv:"NV02", kh:"KH01"}]
    };
    let cur = 'sp', editIdx = -1;

    function switchTab(t) {
        cur = t; editIdx = -1;
        document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
        document.getElementById('btn-'+t).classList.add('active');
        renderForm(); renderTable(); updateStats();
    }

    function renderForm(ed = null) {
        const f = document.getElementById('fields');
        const cfg = {sp:["ID","Tên","Loại","Nhập","Bán","Tồn"], nv:["ID","Tên","Chức vụ","SĐT"], kh:["ID","Tên","SĐT","Địa chỉ"], hd:["ID","Ngày","Tổng","NV","KH"]};
        f.innerHTML = cfg[cur].map((l,i) => `<input id="f${i}" placeholder="${l}" value="${ed?Object.values(ed)[i]:''}">`).join('');
    }

    function renderTable(fil = null) {
        const h = document.getElementById('thead'), b = document.getElementById('tbody'), l = fil || db[cur];
        let heads = (cur==='sp')?["Mã","Tên","Loại","Nhập","Bán","Tồn","Lệnh"]:["ID","Tên/Ngày","SĐT/Tiền","Khác","Lệnh"];
        h.innerHTML = `<tr>${heads.map(x => `<th>${x}</th>`).join('')}</tr>`;
        b.innerHTML = l.map((item, idx) => `<tr>${Object.values(item).map(v => `<td>${v}</td>`).join('')}<td><button class="btn btn-edit" onclick="edit(${idx})">Sửa</button><button class="btn btn-del" onclick="del(${idx})">Xóa</button></td></tr>`).join('');
    }

    function save() {
        let obj = {}; Object.keys(db[cur][0]).forEach((k,i) => obj[k] = document.getElementById('f'+i).value);
        if(editIdx===-1) db[cur].push(obj); else db[cur][editIdx] = obj;
        localStorage.setItem('store_v3', JSON.stringify(db));
        editIdx=-1; renderForm(); renderTable(); updateStats();
    }

    function edit(i) { editIdx = i; renderForm(db[cur][i]); window.scrollTo(0,0); }
    function del(i) { if(confirm("Xóa?")) { db[cur].splice(i,1); localStorage.setItem('store_v3', JSON.stringify(db)); renderTable(); updateStats(); } }
    function handleSearch() { 
        const q = document.getElementById('searchInput').value.toLowerCase();
        renderTable(db[cur].filter(i => Object.values(i).some(v => v.toString().toLowerCase().includes(q))));
    }
    function updateStats() {
        const rev = db.hd.reduce((s,i) => s + Number(i.total||0), 0);
        document.getElementById('st-rev').innerText = rev.toLocaleString() + "đ";
        document.getElementById('st-count').innerText = db.sp.length;
        document.getElementById('st-out').innerText = db.sp.filter(s => Number(s.stock)===0).length;
    }
    function exportCSV() {
        let r = [Object.keys(db[cur][0]).join(",")];
        db[cur].forEach(o => r.push(Object.values(o).join(",")));
        const b = new Blob(["\ufeff"+r.join("\n")], {type:'text/csv'});
        const a = document.createElement("a"); a.href=URL.createObjectURL(b); a.download=`${cur}.csv`; a.click();
    }
    switchTab('sp');
</script>
</body>
</html>
