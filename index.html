<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Quản Lý Cửa Hàng - Full Chức Năng</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; display: flex; background: #f4f7f6; height: 100vh; }
        .sidebar { width: 250px; background: var(--primary); color: white; display: flex; flex-direction: column; }
        .sidebar h2 { padding: 20px; text-align: center; background: #1a252f; margin: 0; font-size: 1.1em; }
        .nav-item { padding: 15px 25px; cursor: pointer; transition: 0.3s; border-left: 5px solid transparent; }
        .nav-item:hover, .nav-item.active { background: #34495e; border-left: 5px solid var(--accent); }
        .content { flex: 1; padding: 30px; overflow-y: auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        /* Cụm nút chức năng */
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px; }
        .search-box { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .btn { padding: 10px 18px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn-add { background: var(--success); }
        .btn-report { background: var(--warning); }
        .btn-edit { background: var(--accent); padding: 5px 10px; font-size: 12px; margin-right: 5px; }
        .btn-del { background: var(--danger); padding: 5px 10px; font-size: 12px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; color: var(--primary); padding: 15px; text-align: left; border-bottom: 2px solid #dee2e6; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>QUẢN LÝ CỬA HÀNG 👔</h2>
    <div class="nav-item active" onclick="changeTab('sp')">📦 Sản Phẩm</div>
    <div class="nav-item" onclick="changeTab('nv')">👥 Nhân Viên</div>
    <div class="nav-item" onclick="changeTab('kh')">⭐ Khách Hàng</div>
    <div class="nav-item" onclick="changeTab('hd')">🧾 Hóa Đơn</div>
</div>

<div class="content">
    <div class="card">
        <h1 id="title" style="margin-top:0">Quản lý Sản Phẩm</h1>
        
        <div class="toolbar">
            <input type="text" class="search-box" id="searchInput" placeholder="Tìm kiếm..." onkeyup="renderTable(this.value)">
            <button class="btn btn-add" onclick="alert('Nút THÊM hoạt động!')">➕ Thêm Mới</button>
            <button class="btn btn-report" onclick="alert('Đang xuất BÁO CÁO doanh thu...')">📊 Báo Cáo</button>
        </div>

        <table id="dataTable">
            <thead id="thead"></thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
</div>

<script>
    const db = {
        sp: [{ id: "SP01", name: "Áo Sơ Mi", type: "Áo", sell: "250,000", stock: 10 }],
        nv: [{ id: "NV01", name: "Văn Anh", role: "Quản lý", phone: "090123" }],
        kh: [{ id: "KH01", name: "Thị Mai", phone: "032145", addr: "Hà Nội" }],
        hd: [{ id: "HD01", date: "2023-09-01", total: "400,000", nv: "NV02" }]
    };

    let currentTab = 'sp';

    function changeTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
        renderTable();
    }

    function renderTable(filter = "") {
        const head = document.getElementById('thead');
        const body = document.getElementById('tbody');
        let h = (currentTab==='sp') ? ["Mã", "Tên SP", "Loại", "Giá Bán", "Kho", "Thao tác"] : ["Mã", "Tên", "Thông tin", "SĐT", "Thao tác"];
        head.innerHTML = `<tr>${h.map(title => `<th>${title}</th>`).join('')}</tr>`;
        
        body.innerHTML = db[currentTab].map(item => `
            <tr>
                ${Object.values(item).map(v => `<td>${v}</td>`).join('')}
                <td>
                    <button class="btn btn-edit">Sửa</button>
                    <button class="btn btn-del">Xóa</button>
                </td>
            </tr>
        `).join('');
    }
    renderTable();
</script>
</body>
</html>
