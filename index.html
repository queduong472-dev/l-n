<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Cửa Hàng - Bản Full Tính Năng</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; display: flex; background: #f4f7f6; height: 100vh; }
        
        /* Sidebar gốc */
        .sidebar { width: 260px; background: var(--primary); color: white; display: flex; flex-direction: column; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        .sidebar h2 { padding: 25px; text-align: center; background: #1a252f; margin: 0; font-size: 1.2em; text-transform: uppercase; }
        .nav-item { padding: 18px 25px; cursor: pointer; transition: 0.3s; border-left: 5px solid transparent; display: flex; align-items: center; gap: 10px; }
        .nav-item:hover, .nav-item.active { background: #34495e; border-left: 5px solid var(--accent); }

        /* Content */
        .content { flex: 1; padding: 30px; overflow-y: auto; }
        
        /* Dashboard Thống kê */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; border-left: 5px solid var(--accent); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stat-card h3 { margin: 0; font-size: 0.9em; color: #7f8c8d; }
        .stat-card p { margin: 10px 0 0 0; font-size: 1.8em; font-weight: bold; color: var(--primary); }

        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { margin: 0 0 20px 0; color: var(--primary); font-size: 1.5em; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }

        /* Toolbar */
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 15px; }
        .search-box { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; outline: none; }
        .btn { padding: 10px 18px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn-add { background: var(--success); }
        .btn-export { background: #607d8b; }
        .btn-edit { background: var(--warning); padding: 5px 10px; font-size: 11px; margin-right: 5px; }
        .btn-del { background: var(--danger); padding: 5px 10px; font-size: 11px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; color: var(--primary); padding: 15px; text-align: left; border-bottom: 2px solid #dee2e6; font-size: 14px; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; font-size: 14px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Quản Lý Cửa Hàng 👔</h2>
    <div class="nav-item active" id="btn-sp" onclick="switchTab('sp')">📦 Sản Phẩm</div>
    <div class="nav-item" id="btn-nv" onclick="switchTab('nv')">👥 Nhân Viên</div>
    <div class="nav-item" id="btn-kh" onclick="switchTab('kh')">⭐ Khách Hàng</div>
    <div class="nav-item" id="btn-hd" onclick="switchTab('hd')">🧾 Hóa Đơn</div>
</div>

<div class="content">
    <div class="stats-grid">
        <div class="stat-card" style="border-left-color: var(--success);">
            <h3>TỔNG DOANH THU</h3>
            <p id="stat-revenue">0đ</p>
        </div>
        <div class="stat-card" style="border-left-color: var(--accent);">
            <h3>MẶT HÀNG TRONG KHO</h3>
            <p id="stat-count">0</p>
        </div>
        <div class="stat-card" style="border-left-color: var(--danger);">
            <h3>SẢN PHẨM HẾT HÀNG</h3>
            <p id="stat-out">0</p>
        </div>
    </div>

    <div class="card">
        <h1 id="tab-title">Quản lý Sản Phẩm</h1>
        
        <div class="toolbar">
            <input type="text" id="search-input" class="search-box" placeholder="Tìm kiếm nhanh..." onkeyup="handleSearch()">
            <button class="btn btn-export" onclick="exportCSV()">📊 Xuất File CSV</button>
        </div>

        <div style="background: #f9f9f9; padding: 20px; border-radius: 8px; margin-bottom: 25px;">
            <div id="input-fields" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 15px;"></div>
            <button class="btn btn-add" id="submit-btn" onclick="handleSave()">Lưu Dữ Liệu</button>
        </div>

        <table id="main-table">
            <thead id="table-head"></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script>
    // Dữ liệu mẫu khớp hoàn toàn với SQL của bạn
    const defaultData = {
        sp: [
            { id: "SP01", name: "Áo Sơ Mi Trắng", type: "Áo", buy: 150000, sell: 250000, stock: 0 },
            { id: "SP02", name: "Quần Jean Nam Xanh", type: "Quần", buy: 300000, sell: 550000, stock: 67 }
        ],
        nv: [
            { id: "NV01", name: "Nguyễn Văn Anh", role: "Quản lý", phone: "0901234567", mail: "annv@gmail.com" }
        ],
        kh: [
            { id: "KH01", name: "Nguyễn Thị Mai", phone: "0321456789", addr: "Hà Nội", gender: "Nữ" }
        ],
        hd: [
            { id: "HD01", date: "2023-09-01", total: 400000, staff: "NV01", customer: "KH01" },
            { id: "HD02", date: "2023-09-02", total: 1100000, staff: "NV02", customer: "KH03" }
        ]
    };

    let appData = JSON.parse(localStorage.getItem('storeDB')) || defaultData;
    let currentTab = 'sp';
    let editIdx = -1;

    function switchTab(tab) {
        currentTab = tab; editIdx = -1;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('btn-' + tab).classList.add('active');
        document.getElementById('tab-title').innerText = "Quản lý " + (tab==='sp'?'Sản Phẩm':tab==='nv'?'Nhân Viên':tab==='kh'?'Khách Hàng':'Hóa Đơn');
        renderForm(); renderTable(); updateDashboard();
    }

    function renderForm(editData = null) {
        const grid = document.getElementById('input-fields');
        const btn = document.getElementById('submit-btn');
        btn.innerText = editIdx === -1 ? "Thêm Mới" : "Cập Nhật Thay Đổi";
        
        const config = {
            sp: ["Mã SP", "Tên SP", "Loại", "Giá Nhập", "Giá Bán", "Tồn kho"],
            nv: ["Mã NV", "Họ Tên", "Chức vụ", "SĐT", "Email"],
            kh: ["Mã KH", "Họ Tên", "SĐT", "Địa chỉ", "Giới tính"],
            hd: ["Mã HD", "Ngày tạo", "Thành tiền", "Mã NV", "Mã KH"]
        };

        grid.innerHTML = config[currentTab].map((label, i) => {
            const val = editData ? Object.values(editData)[i] : "";
            return `<input id="f${i}" placeholder="${label}" value="${val}" style="padding:10px; border:1px solid #ddd; border-radius:5px;">`;
        }).join('');
    }

    function renderTable(filtered = null) {
        const head = document.getElementById('table-head');
        const body = document.getElementById('table-body');
        const list = filtered || appData[currentTab];
        
        let h = (currentTab==='sp') ? ["Mã", "Tên SP", "Loại", "Nhập", "Bán", "Tồn", "Thao tác"] :
                (currentTab==='nv') ? ["Mã", "Tên", "Chức vụ", "SĐT", "Email", "Thao tác"] :
                (currentTab==='kh') ? ["Mã", "Tên", "SĐT", "Địa chỉ", "Phái", "Thao tác"] :
                                      ["Mã HD", "Ngày", "Tổng", "NV", "KH", "Thao tác"];

        head.innerHTML = `<tr>${h.map(t => `<th>${t}</th>`).join('')}</tr>`;
        body.innerHTML = list.map((item, idx) => `
            <tr>
                ${Object.values(item).map(v => `<td>${typeof v === 'number' ? v.toLocaleString() : v}</td>`).join('')}
                <td>
                    <button class="btn btn-edit" onclick="startEdit(${idx})">Sửa</button>
                    <button class="btn btn-del" onclick="handleDelete(${idx})">Xóa</button>
                </td>
            </tr>
        `).join('');
    }

    function handleSave() {
        const inputs = document.querySelectorAll('#input-fields input');
        let newItem = {};
        const keys = Object.keys(appData[currentTab][0]);
        keys.forEach((k, i) => {
            const val = inputs[i].value;
            newItem[k] = (k==='buy' || k==='sell' || k==='stock' || k==='total') ? Number(val) : val;
        });

        if (editIdx === -1) appData[currentTab].push(newItem);
        else appData[currentTab][editIdx] = newItem;

        localStorage.setItem('storeDB', JSON.stringify(appData));
        editIdx = -1; renderForm(); renderTable(); updateDashboard();
    }

    function startEdit(idx) {
        editIdx = idx;
        renderForm(appData[currentTab][idx]);
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function handleDelete(idx) {
        if(confirm("Xác nhận xóa?")) {
            appData[currentTab].splice(idx, 1);
            localStorage.setItem('storeDB', JSON.stringify(appData));
            renderTable(); updateDashboard();
        }
    }

    function handleSearch() {
        const q = document.getElementById('search-input').value.toLowerCase();
        const res = appData[currentTab].filter(i => Object.values(i).some(v => v.toString().toLowerCase().includes(q)));
        renderTable(res);
    }

    function updateDashboard() {
        // Tự động tính doanh thu từ bảng Hóa đơn
        const revenue = appData.hd.reduce((sum, item) => sum + Number(item.total || 0), 0);
        document.getElementById('stat-revenue').innerText = revenue.toLocaleString() + "đ";
        document.getElementById('stat-count').innerText = appData.sp.length;
        document.getElementById('stat-out').innerText = appData.sp.filter(s => Number(s.stock) === 0).length;
    }

    function exportCSV() {
        let rows = [Object.keys(appData[currentTab][0]).join(",")];
        appData[currentTab].forEach(obj => rows.push(Object.values(obj).join(",")));
        const blob = new Blob(["\ufeff" + rows.join("\n")], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `BaoCao_${currentTab}.csv`;
        link.click();
    }

    switchTab('sp');
</script>
</body>
</html>
