<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Quản Lý Cửa Hàng - Cloud Database Realtime</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; display: flex; background: #f4f7f6; height: 100vh; }
        .sidebar { width: 260px; background: var(--primary); color: white; display: flex; flex-direction: column; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        .sidebar h2 { padding: 25px; text-align: center; background: #1a252f; margin: 0; font-size: 1.1em; text-transform: uppercase; }
        .nav-item { padding: 18px 25px; cursor: pointer; transition: 0.3s; border-left: 5px solid transparent; }
        .nav-item:hover, .nav-item.active { background: #34495e; border-left: 5px solid var(--accent); }
        .content { flex: 1; padding: 30px; overflow-y: auto; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; border-left: 5px solid var(--accent); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stat-card h3 { margin: 0; font-size: 0.85em; color: #7f8c8d; text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0 0; font-size: 1.6em; font-weight: bold; color: var(--primary); }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .toolbar { display: flex; justify-content: space-between; gap: 15px; margin-bottom: 20px; }
        .search-box { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; outline: none; }
        .btn { padding: 10px 18px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn-add { background: var(--success); }
        .btn-edit { background: var(--warning); font-size: 11px; padding: 5px 8px; margin-right: 3px; }
        .btn-del { background: var(--danger); font-size: 11px; padding: 5px 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; padding: 15px; text-align: left; border-bottom: 2px solid #dee2e6; color: var(--primary); }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; font-size: 14px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>QUẢN LÝ CỬA HÀNG 👔</h2>
    <div class="nav-item active" id="btn-sp" onclick="switchTab('sp')">📦 Sản Phẩm</div>
    <div class="nav-item" id="btn-nv" onclick="switchTab('nv')">👥 Nhân Viên</div>
    <div class="nav-item" id="btn-kh" onclick="switchTab('kh')">⭐ Khách Hàng</div>
    <div class="nav-item" id="btn-hd" onclick="switchTab('hd')">🧾 Hóa Đơn</div>
</div>

<div class="content">
    <div class="stats-grid">
        <div class="stat-card" style="border-left-color: var(--success);"><h3>Doanh Thu</h3><p id="st-rev">0đ</p></div>
        <div class="stat-card"><h3>Số Mặt Hàng</h3><p id="st-count">0</p></div>
        <div class="stat-card" style="border-left-color: var(--danger);"><h3>Hết Hàng</h3><p id="st-out">0</p></div>
    </div>
    <div class="card">
        <h1 id="tab-title" style="margin-top:0; font-size: 1.4em;">Quản lý Sản Phẩm</h1>
        <div class="toolbar">
            <input type="text" id="searchInput" class="search-box" placeholder="Tìm kiếm nhanh..." onkeyup="handleSearch()">
            <button class="btn" style="background:#607d8b" onclick="exportCSV()">📊 Xuất File CSV</button>
        </div>
        <div style="background:#f9f9f9; padding:15px; border-radius:8px; margin-bottom:20px;">
            <div id="fields" style="display:grid; grid-template-columns: repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin-bottom:10px;"></div>
            <button class="btn btn-add" id="sub-btn" onclick="handleSave()">Lưu Lên Cloud</button>
        </div>
        <table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
    </div>
</div>

<script>
    // ĐÃ THAY 2 LINK CỦA BẠN VÀO ĐÂY 
    const SUPABASE_URL = 'https://krpklskksqtewvovymfw.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_N_7ieYpq2vEHM3Ylf48GLw_vmGm_YJW';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentTab = 'sp', editId = null, allData = [];

    async function switchTab(tab) {
        currentTab = tab; editId = null;
        document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
        document.getElementById('btn-'+tab).classList.add('active');
        document.getElementById('tab-title').innerText = "Quản lý " + (tab==='sp'?'Sản Phẩm':tab==='nv'?'Nhân Viên':tab==='kh'?'Khách Hàng':'Hóa Đơn');
        renderForm(); fetchData();
    }

    function renderForm(data = null) {
        const f = document.getElementById('fields');
        const cfg = {
            sp: ["MaSP", "TenSP", "LoaiSP", "GiaNhap", "GiaBan", "SoLuongTon"], [cite: 14, 157-166]
            nv: ["MaNV", "TenNV", "ChucVu", "SDTNV"], [cite: 12, 127-137]
            kh: ["MaKH", "TenKH", "SDTKH", "DiaChi"], [cite: 15, 139-148]
            hd: ["MaHD", "NgayTao", "ThanhTien", "MaNV", "MaKH"] [cite: 16, 168-177]
        };
        f.innerHTML = cfg[currentTab].map((l,i) => `<input id="f${i}" placeholder="${l}" value="${data?Object.values(data)[i]:''}">`).join('');
    }

    async function fetchData() {
        const tableMap = {sp:'SANPHAM', nv:'NHANVIEN', kh:'KHACHHANG', hd:'HOADON'}; [cite: 55-64]
        const { data, error } = await supabase.from(tableMap[currentTab]).select('*');
        if (error) console.error(error);
        else { allData = data; renderTable(data); updateStats(); }
    }

    function renderTable(list) {
        const h = document.getElementById('thead'), b = document.getElementById('tbody');
        let heads = (currentTab==='sp') ? ["Mã", "Tên", "Loại", "Nhập", "Bán", "Tồn", "Lệnh"] : ["ID", "Tên/Ngày", "Thông tin 1", "Thông tin 2", "Lệnh"];
        h.innerHTML = `<tr>${heads.map(x => `<th>${x}</th>`).join('')}</tr>`;
        b.innerHTML = list.map(item => `<tr>${Object.values(item).map(v => `<td>${v}</td>`).join('')}<td><button class="btn btn-edit" onclick="startEdit('${Object.values(item)[0]}')">Sửa</button><button class="btn btn-del" onclick="handleDelete('${Object.values(item)[0]}')">Xóa</button></td></tr>`).join('');
    }

    async function handleSave() {
        const tableMap = {sp:'SANPHAM', nv:'NHANVIEN', kh:'KHACHHANG', hd:'HOADON'};
        const fields = document.querySelectorAll('#fields input');
        let obj = {};
        const configKeys = {
            sp: ['MaSP', 'TenSP', 'LoaiSP', 'GiaNhap', 'GiaBan', 'SoLuongTon'],
            nv: ['MaNV', 'TenNV', 'ChucVu', 'SDTNV'],
            kh: ['MaKH', 'TenKH', 'SDTKH', 'DiaChi'],
            hd: ['MaHD', 'NgayTao', 'ThanhTien', 'MaNV', 'MaKH']
        };
        
        configKeys[currentTab].forEach((k, i) => {
            let val = fields[i].value;
            obj[k] = (k.includes('Gia') || k.includes('Ton') || k.includes('Tien')) ? Number(val) : val;
        });

        if (!editId) await supabase.from(tableMap[currentTab]).insert([obj]); [cite: 115-208]
        else await supabase.from(tableMap[currentTab]).update(obj).eq(configKeys[currentTab][0], editId);
        
        alert("Dữ liệu đã đồng bộ lên Cloud!"); switchTab(currentTab);
    }

    async function handleDelete(id) {
        if(confirm("Xóa vĩnh viễn trên Database?")) {
            const tableMap = {sp:'SANPHAM', nv:'NHANVIEN', kh:'KHACHHANG', hd:'HOADON'};
            const idKey = (currentTab==='sp')?'MaSP':(currentTab==='nv')?'MaNV':'MaKH';
            await supabase.from(tableMap[currentTab]).delete().eq(idKey, id);
            fetchData();
        }
    }

    function startEdit(id) {
        editId = id; const data = allData.find(i => Object.values(i)[0] == id);
        renderForm(data); window.scrollTo(0,0);
    }

    async function updateStats() {
        const { data: hdData } = await supabase.from('HOADON').select('ThanhTien'); [cite: 168-177]
        const { data: spData } = await supabase.from('SANPHAM').select('SoLuongTon'); [cite: 157-166]
        const rev = (hdData || []).reduce((s,i) => s + Number(i.ThanhTien||0), 0); [cite: 287-290]
        document.getElementById('st-rev').innerText = rev.toLocaleString() + "đ";
        document.getElementById('st-count').innerText = (spData || []).length;
        document.getElementById('st-out').innerText = (spData || []).filter(s => Number(s.SoLuongTon) === 0).length; [cite: 291-296]
    }

    function handleSearch() {
        const q = document.getElementById('searchInput').value.toLowerCase(); [cite: 222-227]
        renderTable(allData.filter(i => Object.values(i).some(v => v.toString().toLowerCase().includes(q))));
    }

    function exportCSV() {
        if(allData.length === 0) return;
        let r = [Object.keys(allData[0]).join(",")];
        allData.forEach(o => r.push(Object.values(o).join(",")));
        const b = new Blob(["\ufeff"+r.join("\n")], {type:'text/csv'});
        const a = document.createElement("a"); a.href=URL.createObjectURL(b); a.download=`${currentTab}.csv`; a.click();
    }

    switchTab('sp');
</script>
</body>
</html>
