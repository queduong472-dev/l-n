<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Quản Lý Cửa Hàng - Bản Chuyên Sâu</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; display: flex; background: #f4f7f6; height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 250px; background: var(--primary); color: white; display: flex; flex-direction: column; }
        .sidebar h2 { padding: 20px; text-align: center; background: #1a252f; margin: 0; font-size: 1.1em; }
        .nav-item { padding: 15px 25px; cursor: pointer; transition: 0.3s; border-left: 5px solid transparent; }
        .nav-item:hover, .nav-item.active { background: #34495e; border-left: 5px solid var(--accent); }

        /* Main Content */
        .content { flex: 1; padding: 30px; overflow-y: auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* Toolbar & Stats */
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px; }
        .search-box { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .stats-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
        .stat-card { padding: 20px; border-radius: 10px; color: white; text-align: center; }

        /* Buttons */
        .btn { padding: 10px 18px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn-add { background: var(--success); }
        .btn-report { background: var(--warning); }
        .btn-edit { background: var(--accent); margin-right: 5px; padding: 5px 10px; font-size: 12px; }
        .btn-del { background: var(--danger); padding: 5px 10px; font-size: 12px; }
        .btn:hover { opacity: 0.8; transform: translateY(-1px); }

        /* Table */
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; color: var(--primary); padding: 15px; text-align: left; border-bottom: 2px solid #dee2e6; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; font-size: 14px; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .out { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>QUẢN LÝ CỬA HÀNG 👔</h2>
    <div class="nav-item active" onclick="changeTab('sp')">📦 Sản Phẩm</div>
    <div class="nav-item" onclick="changeTab('nv')">👥 Nhân Viên</div>
    <div class="nav-item" onclick="changeTab('kh')">⭐ Khách Hàng</div>
    <div class="nav-item" onclick="changeTab('hd')">🧾 Hóa Đơn</div>
</div>

<div class="content">
    <div class="stats-container" id="stats-area">
        <div class="stat-card" style="background: var(--accent)"><h3>Tổng Sản Phẩm</h3><p id="stat-sp">0</p></div>
        <div class="stat-card" style="background: var(--success)"><h3>Doanh Thu</h3><p id="stat-revenue">0đ</p></div>
        <div class="stat-card" style="background: var(--warning)"><h3>Hết Hàng</h3><p id="stat-out">0</p></div>
    </div>

    <div class="card">
        <h1 id="title" style="margin-top:0">Quản lý Sản Phẩm</h1>
        <div class="toolbar">
            <input type="text" class="search-box" id="searchInput" placeholder="Tìm kiếm theo mã hoặc tên..." onkeyup="renderTable(this.value)">
            <button class="btn btn-add" onclick="alert('Mở form thêm mới...')">+ Thêm</button>
            <button class="btn btn-report" onclick="exportReport()">📊 Xuất Báo Cáo</button>
        </div>

        <table id="dataTable">
            <thead id="thead"></thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
</div>

<script>
    // Dữ liệu đồng bộ 100% từ file SQL của bạn
    const db = {
        sp: [
            { id: "SP01", name: "Áo Sơ Mi Trắng", type: "Áo", buy: 150000, sell: 250000, stock: 0 },
            { id: "SP02", name: "Quần Jean Nam Xanh", type: "Quần", buy: 300000, sell: 550000, stock: 67 },
            { id: "SP03", name: "Áo Thun Basic", type: "Áo", buy: 80000, sell: 150000, stock: 69 },
            { id: "SP06", name: "Áo Khoác Gió", type: "Áo", buy: 350000, sell: 600000, stock: 5 }
        ],
        nv: [
            { id: "NV01", name: "Nguyễn Văn Anh", role: "Quản lý", phone: "0901234567", salary: "L15" },
            { id: "NV02", name: "Nguyễn Phương Anh", role: "Bán hàng", phone: "0912345678", salary: "L10" }
        ],
        kh: [
            { id: "KH01", name: "Nguyễn Thị Mai", phone: "0321456789", addr: "Hà Nội" },
            { id: "KH05", name: "Trịnh Đắc Nam", phone: "0365890123", addr: "TP HCM" }
        ],
        hd: [
            { id: "HD01", date: "2023-09-01", total: 400000, nv: "NV02", kh: "KH01" },
            { id: "HD08", date: "2023-09-05", total: 1300000, nv: "NV13", kh: "KH10" }
        ]
    };

    let currentTab = 'sp';

    function changeTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
        document.getElementById('title').innerText = "Quản lý " + (tab==='sp'?'Sản Phẩm':tab==='nv'?'Nhân Viên':tab==='kh'?'Khách Hàng':'Hóa Đơn');
        renderTable();
        updateStats();
    }

    function renderTable(filter = "") {
        const head = document.getElementById('thead');
        const body = document.getElementById('tbody');
        let h = (currentTab==='sp') ? ["Mã", "Tên SP", "Loại", "Giá Nhập", "Giá Bán", "Tồn", "Lệnh"] :
                (currentTab==='nv') ? ["Mã", "Tên NV", "Chức vụ", "SĐT", "Mã Lương", "Lệnh"] :
                (currentTab==='kh') ? ["Mã", "Họ Tên", "SĐT", "Địa chỉ", "Lệnh"] :
                                      ["Mã HD", "Ngày", "Tổng Tiền", "NV", "KH", "Lệnh"];

        head.innerHTML = `<tr>${h.map(title => `<th>${title}</th>`).join('')}</tr>`;
        
        const filtered = db[currentTab].filter(i => Object.values(i).some(v => v.toString().toLowerCase().includes(filter.toLowerCase())));

        body.innerHTML = filtered.map(item => `
            <tr>
                ${Object.values(item).map((v, i) => (currentTab==='sp' && i===5 && v===0) ? `<td><span class="badge out">Hết hàng</span></td>` : `<td>${typeof v === 'number' ? v.toLocaleString() : v}</td>`).join('')}
                <td>
                    <button class="btn btn-edit" onclick="editItem('${item.id}')">Sửa</button>
                    <button class="btn btn-del" onclick="deleteItem('${item.id}')">Xóa</button>
                </td>
            </tr>
        `).join('');
    }

    function updateStats() {
        document.getElementById('stat-sp').innerText = db.sp.length;
        const revenue = db.hd.reduce((sum, h) => sum + h.total, 0);
        document.getElementById('stat-revenue').innerText = revenue.toLocaleString() + "đ";
        document.getElementById('stat-out').innerText = db.sp.filter(s => s.stock === 0).length;
    }

    function exportReport() {
        const revenue = db.hd.reduce((sum, h) => sum + h.total, 0);
        alert(`BÁO CÁO NHANH:\n- Tổng doanh thu: ${revenue.toLocaleString()}đ\n- Số lượng mặt hàng: ${db.sp.length}\n- Sản phẩm cần nhập: ${db.sp.filter(s => s.stock === 0).map(s => s.name).join(', ')}`);
    }

    function deleteItem(id) { if(confirm(`Bạn có chắc muốn xóa mã ${id} không?`)) alert('Đã thực thi lệnh DELETE trong SQL cho mã ' + id); }
    function editItem(id) { alert('Đang lấy dữ liệu mã ' + id + ' để chỉnh sửa...'); }

    updateStats();
    renderTable();
</script>
</body>
</html>
