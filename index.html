<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Quản Lý Cửa Hàng - Bản Nâng Cấp</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; display: flex; background: #f4f7f6; height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--primary); color: white; display: flex; flex-direction: column; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        .sidebar h2 { padding: 25px; text-align: center; background: #1a252f; margin: 0; font-size: 1.2em; text-transform: uppercase; letter-spacing: 1px; }
        .nav-item { padding: 18px 25px; cursor: pointer; transition: 0.3s; border-left: 5px solid transparent; display: flex; align-items: center; gap: 10px; }
        .nav-item:hover, .nav-item.active { background: #34495e; border-left: 5px solid var(--accent); }

        /* Main Content */
        .content { flex: 1; padding: 30px; overflow-y: auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { margin-top: 0; color: #2c3e50; font-size: 1.5em; border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px; }

        /* Toolbar (Search & Export) */
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 15px; }
        .search-box { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; outline: none; }
        .search-box:focus { border-color: var(--accent); }

        /* Form Nhập liệu */
        .form-container { background: #f9f9f9; padding: 20px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #eee; }
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 15px; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 5px; outline: none; transition: 0.2s; }
        
        /* Nút bấm */
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn-add { background: var(--success); }
        .btn-export { background: #607d8b; }
        .btn-edit { background: var(--warning); padding: 5px 10px; font-size: 12px; margin-right: 5px; }
        .btn-del { background: var(--danger); padding: 5px 10px; font-size: 12px; }
        .btn:hover { opacity: 0.8; transform: translateY(-1px); }

        /* Bảng */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; color: var(--primary); padding: 15px; text-align: left; border-bottom: 2px solid #dee2e6; font-size: 14px; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; font-size: 14px; color: #555; }
        tr:hover { background: #fdfdfd; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Quản Lý Cửa Hàng</h2>
    <div class="nav-item active" id="btn-sp" onclick="switchTab('sp')">📦 Sản Phẩm</div>
    <div class="nav-item" id="btn-nv" onclick="switchTab('nv')">👥 Nhân Viên</div>
    <div class="nav-item" id="btn-kh" onclick="switchTab('kh')">⭐ Khách Hàng</div>
    <div class="nav-item" id="btn-hd" onclick="switchTab('hd')">🧾 Hóa Đơn</div>
</div>

<div class="content">
    <div class="card">
        <h1 id="tab-title">Quản lý Sản Phẩm</h1>
        
        <div class="toolbar">
            <input type="text" id="search-input" class="search-box" placeholder="Tìm kiếm nhanh thông tin..." onkeyup="handleSearch()">
            <button class="btn btn-export" onclick="exportCSV()">📊 Xuất File CSV</button>
        </div>

        <div class="form-container" id="dynamic-form">
            <div class="input-grid" id="input-fields"></div>
            <button class="btn btn-add" id="main-add-btn" onclick="handleAddItem()">Lưu Dữ Liệu</button>
        </div>

        <table id="main-table">
            <thead id="table-head"></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script>
    const defaultData = {
        sp: [
            { id: "SP01", name: "Áo Sơ Mi Trắng", type: "Áo", buy: 150000, sell: 250000, stock: 0 },
            { id: "SP02", name: "Quần Jean Nam Xanh", type: "Quần", buy: 300000, sell: 550000, stock: 67 }
        ],
        nv: [
            { id: "NV01", name: "Nguyễn Văn Anh", role: "Quản lý", phone: "0901234567", mail: "annv@gmail.com" }
        ],
        kh: [
            { id: "KH01", name: "Nguyễn Thị Mai", phone: "0321456789", addr: "Hà Nội", gender: "Nữ" }
        ],
        hd: [
            { id: "HD01", date: "2023-09-01", total: 400000, staff: "NV02", customer: "KH01" }
        ]
    };

    function loadData() {
        const savedData = localStorage.getItem('storeManagementData');
        return savedData ? JSON.parse(savedData) : defaultData;
    }

    function saveData() {
        localStorage.setItem('storeManagementData', JSON.stringify(appData));
    }

    let appData = loadData();
    let currentTab = 'sp';
    let editIndex = -1; // -1 nghĩa là đang thêm mới, >= 0 nghĩa là đang sửa

    function switchTab(tab) {
        currentTab = tab;
        editIndex = -1;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('btn-' + tab).classList.add('active');
        const titles = {sp: "Sản Phẩm", nv: "Nhân Viên", kh: "Khách Hàng", hd: "Hóa Đơn"};
        document.getElementById('tab-title').innerText = "Quản lý " + titles[tab];
        document.getElementById('search-input').value = "";
        renderForm();
        renderTable();
    }

    function renderForm(existingData = null) {
        const grid = document.getElementById('input-fields');
        const addBtn = document.getElementById('main-add-btn');
        addBtn.innerText = editIndex === -1 ? "Thêm Dữ Liệu Mới" : "Cập Nhật Thay Đổi";
        
        const config = {
            sp: ["Mã SP", "Tên SP", "Loại", "Giá Nhập", "Giá Bán", "Số lượng tồn"],
            nv: ["Mã NV", "Họ Tên", "Chức vụ", "SĐT", "Email"],
            kh: ["Mã KH", "Họ Tên", "SĐT", "Địa chỉ", "Giới tính"],
            hd: ["Mã HD", "Ngày tạo", "Tổng tiền", "Mã NV", "Mã KH"]
        };

        let html = "";
        config[currentTab].forEach((label, i) => {
            let val = existingData ? Object.values(existingData)[i] : "";
            if (currentTab === 'kh' && i === 4) {
                html += `<select id="f${i+1}">
                            <option value="Nam" ${val==='Nam'?'selected':''}>Nam</option>
                            <option value="Nữ" ${val==='Nữ'?'selected':''}>Nữ</option>
                         </select>`;
            } else if (currentTab === 'hd' && i === 1) {
                html += `<input id="f${i+1}" type="date" value="${val}">`;
            } else {
                let type = (label.includes("Giá") || label.includes("tồn") || label.includes("tiền")) ? "number" : "text";
                html += `<input id="f${i+1}" type="${type}" placeholder="${label}" value="${val}">`;
            }
        });
        grid.innerHTML = html;
    }

    function renderTable(dataToRender = null) {
        const head = document.getElementById('table-head');
        const body = document.getElementById('tbody');
        const displayData = dataToRender || appData[currentTab];
        
        let headers = (currentTab==='sp') ? ["Mã", "Tên SP", "Loại", "Nhập", "Bán", "Tồn", "Lệnh"] :
                      (currentTab==='nv') ? ["Mã", "Tên", "Chức vụ", "SĐT", "Email", "Lệnh"] :
                      (currentTab==='kh') ? ["Mã", "Tên", "SĐT", "Địa chỉ", "Giới tính", "Lệnh"] :
                                            ["Mã", "Ngày", "Tổng", "NV", "KH", "Lệnh"];

        head.innerHTML = `<tr>${headers.map(t => `<th>${t}</th>`).join('')}</tr>`;
        
        const tableBody = document.getElementById('table-body');
        tableBody.innerHTML = displayData.map((item, index) => {
            // Tìm index thực tế trong appData gốc để nút Sửa/Xóa hoạt động đúng khi Search
            const realIndex = appData[currentTab].indexOf(item);
            return `<tr>
                ${Object.values(item).map(v => `<td>${typeof v === 'number' ? v.toLocaleString() : v}</td>`).join('')}
                <td>
                    <button class="btn btn-edit" onclick="handleEdit(${realIndex})">Sửa</button>
                    <button class="btn btn-del" onclick="handleDeleteItem(${realIndex})">Xóa</button>
                </td>
            </tr>`;
        }).join('');
    }

    function handleAddItem() {
        const inputs = document.querySelectorAll('#input-fields input, #input-fields select');
        let newItem = {};
        const keys = Object.keys(appData[currentTab][0] || defaultData[currentTab][0]);
        
        keys.forEach((key, i) => {
            let val = inputs[i].value;
            newItem[key] = inputs[i].type === 'number' ? Number(val) : val;
        });

        if (!newItem.id && !newItem.name) return alert("Vui lòng nhập thông tin!");

        if (editIndex === -1) {
            appData[currentTab].push(newItem);
        } else {
            appData[currentTab][editIndex] = newItem;
            editIndex = -1;
        }

        saveData();
        renderTable();
        renderForm();
    }

    function handleEdit(index) {
        editIndex = index;
        renderForm(appData[currentTab][index]);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function handleDeleteItem(index) {
        if (confirm("Xác nhận xóa bản ghi này?")) {
            appData[currentTab].splice(index, 1);
            saveData();
            renderTable();
        }
    }

    function handleSearch() {
        const query = document.getElementById('search-input').value.toLowerCase();
        const filtered = appData[currentTab].filter(item => 
            Object.values(item).some(val => val.toString().toLowerCase().includes(query))
        );
        renderTable(filtered);
    }

    function exportCSV() {
        let rows = [];
        const displayData = appData[currentTab];
        if (displayData.length === 0) return alert("Không có dữ liệu để xuất!");

        const headers = Object.keys(displayData[0]);
        rows.push(headers.join(","));

        displayData.forEach(obj => {
            rows.push(Object.values(obj).join(","));
        });

        const blob = new Blob(["\ufeff" + rows.join("\n")], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `QuanLy_${currentTab}.csv`;
        link.click();
    }

    switchTab('sp');
</script>
</body>
</html>
